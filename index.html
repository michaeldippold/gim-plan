<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RS TODO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #14161f;
      color: #c8cfe8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-size: 1.6rem;
      color: #a89ee0;
      margin-bottom: 20px;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #2a2d42;
      padding-bottom: 12px;
      flex-shrink: 0;
    }

    .columns {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      flex: 1;
      min-height: 0;
    }

    .section {
      background: #1c1f2e;
      border: 1px solid #2a2d42;
      border-radius: 6px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .section h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #8b80d0;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2a2d42;
      flex-shrink: 0;
    }

    .progress {
      font-size: 0.78rem;
      color: #4a4d6a;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .progress span {
      color: #8b80d0;
      font-weight: 600;
    }

    .items {
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }

    .items::-webkit-scrollbar {
      width: 6px;
    }

    .items::-webkit-scrollbar-track {
      background: transparent;
    }

    .items::-webkit-scrollbar-thumb {
      background: #2a2d42;
      border-radius: 3px;
    }

    /* Completed subsection header */
    .completed-divider {
      font-size: 0.8rem;
      font-weight: 600;
      color: #7a6a30;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 14px;
      padding-bottom: 6px;
      border-bottom: 1px solid #3a3010;
    }

    .item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid #22253a;
    }

    .item:last-child {
      border-bottom: none;
    }

    /* --- Standard checkbox --- */
    .item input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      min-width: 16px;
      border: 1px solid #4a4d70;
      border-radius: 3px;
      background: #14161f;
      cursor: pointer;
      margin-top: 2px;
      position: relative;
      transition: background 0.15s, border-color 0.15s;
    }

    .item input[type="checkbox"]:checked {
      background: #4a3a9a;
      border-color: #7060c0;
    }

    .item input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: 2px solid #c8b8f8;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .item label {
      cursor: pointer;
      flex: 1;
      transition: color 0.15s, text-decoration 0.15s;
    }

    .item input[type="checkbox"]:checked + label {
      color: #4a4d6a;
      text-decoration: line-through;
    }

    /* --- Permanently completed item --- */
    .item.done input[type="checkbox"] {
      background: #2a2010;
      border-color: #7a6020;
      cursor: default;
    }

    .item.done input[type="checkbox"]::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: 2px solid #c8a040;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .item.done label {
      color: #6a5a28;
      text-decoration: line-through;
      cursor: default;
    }

    @media (max-width: 630px) {
      html, body {
        height: auto;
        overflow: auto;
      }

      body {
        display: block;
      }

      .columns {
        min-height: unset;
      }

      .section {
        display: block;
        min-height: unset;
      }

      .items {
        overflow-y: visible;
        flex: unset;
        min-height: unset;
      }
    }
  </style>
</head>
<body>

<h1>Runescape TODO</h1>

<div class="columns" id="app"></div>

<script>
  const data = [
    {
      id: "quests",
      title: "Quests",
      items: [
        { text: "Waterfall Quest", done: false },
        { text: "Witch's House", done: false },
        { text: "Children of the Sun", done: false },
        { text: "Plague City (Ardy 1 diary)", done: false },
        { text: "Biohazard (Ardy 1 diary)", done: false },
        { text: "The Restless Ghost", done: false },
        { text: "Imp Catcher (magic xp)", done: false },
        { text: "Witch's Potion (magic xp)", done: false },
        { text: "Misthalin Mystery (crafting xp)", done: false },
        { text: "Murder Mystery (crafting xp)", done: false },
        { text: "Goblin Diplomacy", done: false },
        { text: "Earnest the Chicken", done: false },
        { text: "Doric's Quest", done: false },
        { text: "Merlin's Crystal", done: false },
        { text: "Priest in Peril", done: false },
        { text: "Making History", done: false },
        { text: "Nature Spirit", done: false },
        { text: "Ghosts Ahoy", done: false },
        { text: "Holy Grail", done: false },
        { text: "Tree Gnome Village (transport)", done: false },
        { text: "The Grand Tree (transport + magic xp)", done: false },
        { text: "Lost City (need 31 Crafting / 36 Woodcutting)", done: false },
        { text: "Fairytale I \u2014 Growing Pains", done: false },
        { text: "Start Fairytale II (fairy ring transport)", done: false },
      ]
    },
    {
      id: "diaries",
      title: "Achievement Diaries",
      items: [
        { text: "Ardougne Easy (transport)", done: false },
        { text: "Varrock Easy (mining armor)", done: false },
      ]
    },
    {
      id: "skills",
      title: "Skill Goals",
      items: [
        { text: "Crafting 30", done: false },
        { text: "Magic 30", done: false },
      ]
    },
    {
      id: "crafting",
      title: "Crafting Goals",
      items: [
        { text: "Rings of Dueling", done: false },
        { text: "Games Necklaces", done: false },
      ]
    },
    {
      id: "gear",
      title: "Gear",
      items: [
        { text: "Zammy Monk Top", done: false },
        { text: "Zammy Monk Bottom", done: false },
        { text: "Climbing Boots", done: false },
        { text: "Boots of Lightness", done: false },
      ]
    },
    {
      id: "miniquests",
      title: "Miniquests",
      items: [
        { text: "Daddy's Home", done: false },
        { text: "Varrock Museum Quiz", done: false },
      ]
    },
  ];

  function getState(sectionId) {
    try {
      return JSON.parse(localStorage.getItem("rs-todo-" + sectionId) || "{}");
    } catch { return {}; }
  }

  function saveState(sectionId, state) {
    localStorage.setItem("rs-todo-" + sectionId, JSON.stringify(state));
  }

  function renderSection(section) {
    const state = getState(section.id);

    const pending = section.items.filter(item => !item.done);
    const completed = section.items.filter(item => item.done);

    // Progress counts only pending items (done ones are already off the board)
    const checkedCount = pending.filter((item, i) => state[i]).length;

    const el = document.createElement("div");
    el.className = "section";
    el.innerHTML = `
      <h2>${section.title}</h2>
      <div class="progress"><span>${checkedCount}/${pending.length}</span> complete</div>
      <div class="items"></div>
    `;

    const itemsEl = el.querySelector(".items");
    const progressEl = el.querySelector(".progress span");

    // Render pending items
    pending.forEach((item, i) => {
      const row = document.createElement("div");
      row.className = "item";

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.id = `${section.id}-${i}`;
      cb.checked = !!state[i];

      const label = document.createElement("label");
      label.htmlFor = cb.id;
      label.textContent = item.text;

      cb.addEventListener("change", () => {
        const s = getState(section.id);
        s[i] = cb.checked;
        saveState(section.id, s);
        const total = pending.filter((_, j) => getState(section.id)[j]).length;
        progressEl.textContent = `${total}/${pending.length}`;
      });

      row.appendChild(cb);
      row.appendChild(label);
      itemsEl.appendChild(row);
    });

    // Render completed items under a divider
    if (completed.length > 0) {
      const divider = document.createElement("div");
      divider.className = "completed-divider";
      divider.textContent = "Completed";
      itemsEl.appendChild(divider);

      completed.forEach((item, i) => {
        const row = document.createElement("div");
        row.className = "item done";

        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.id = `${section.id}-done-${i}`;
        cb.checked = true;
        cb.addEventListener("click", e => e.preventDefault()); // non-interactive

        const label = document.createElement("label");
        label.htmlFor = cb.id;
        label.textContent = item.text;

        row.appendChild(cb);
        row.appendChild(label);
        itemsEl.appendChild(row);
      });
    }

    return el;
  }

  const app = document.getElementById("app");
  data.forEach(section => app.appendChild(renderSection(section)));
</script>

</body>
</html>
